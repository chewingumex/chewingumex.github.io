  <!-- ── INFO PANEL ── -->
  <rect x="460" y="300" width="260" height="110" rx="4" fill="rgba(14,21,32,0.9)" stroke="#1c2840" stroke-width="1"/>
  <text x="476" y="322" font-family="monospace" font-size="8" fill="#6a7a99" letter-spacing="2">SEGMENTATION MODEL</text>
  <text x="476" y="342" font-family="monospace" font-size="9" fill="#cdd6f4">UK Postcodes + Cookie Data</text>
  <text x="476" y="358" font-family="monospace" font-size="9" fill="#cdd6f4">4 Psychographic Segments</text>
  <text x="476" y="374" font-family="monospace" font-size="9" fill="#cdd6f4">Digital Billboard Targeting</text>
  <text x="476" y="390" font-family="monospace" font-size="9" fill="#6a7a99">Nielsen Marketing Cloud</text>

  <!-- ── LEGEND ── -->
