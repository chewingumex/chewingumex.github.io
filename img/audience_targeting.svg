  <circle cx="218" cy="405" r="4" fill="#f59e0b" opacity="0.65"/>
  <circle cx="145" cy="448" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="240" cy="430" r="4" fill="#f59e0b" opacity="0.6"/>
  <circle cx="118" cy="445" r="3" fill="#f59e0b" opacity="0.55"/>
