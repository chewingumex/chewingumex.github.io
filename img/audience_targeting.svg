  <rect x="80" y="68" width="320" height="226" fill="url(#q2)"/>
  <rect x="80" y="294" width="320" height="226" fill="url(#q3)"/>
  <rect x="400" y="294" width="320" height="226" fill="url(#q4)"/>

  <!-- Quadrant labels -->
