  <line x1="80" y1="520" x2="720" y2="520" stroke="#1c2840" stroke-width="1.2"/>
  <!-- Mid-lines (quadrant dividers) -->
  <line x1="400" y1="68" x2="400" y2="520" stroke="#1c2840" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="80" y1="294" x2="720" y2="294" stroke="#1c2840" stroke-width="0.7" stroke-dasharray="4,4"/>

  <!-- Axis labels -->
