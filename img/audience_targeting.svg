  <circle cx="615" cy="138" r="4" fill="#00e5ff" opacity="0.7"/>
  <circle cx="580" cy="175" r="7" fill="#00e5ff" opacity="0.95"/> <!-- centroid -->
  <circle cx="610" cy="188" r="4" fill="#00e5ff" opacity="0.65"/>
  <circle cx="555" cy="190" r="5" fill="#00e5ff" opacity="0.7"/>
  <circle cx="640" cy="158" r="4" fill="#00e5ff" opacity="0.6"/>
  <circle cx="660" cy="175" r="3" fill="#00e5ff" opacity="0.5"/>
