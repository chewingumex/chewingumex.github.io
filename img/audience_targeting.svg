      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="q2" x1="0" y1="0" x2="0" y2="1">
