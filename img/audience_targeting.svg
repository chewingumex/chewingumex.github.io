  <text x="38" y="294" font-family="monospace" font-size="9" fill="#6a7a99" text-anchor="middle" letter-spacing="1" transform="rotate(-90,38,294)">PURCHASE INTENT ↑</text>
  <!-- Axis tick labels -->
  <text x="80" y="534" font-family="monospace" font-size="8" fill="#6a7a99" text-anchor="middle">Low</text>
  <text x="720" y="534" font-family="monospace" font-size="8" fill="#6a7a99" text-anchor="middle">High</text>
  <text x="70" y="520" font-family="monospace" font-size="8" fill="#6a7a99" text-anchor="end">Low</text>
  <text x="70" y="72" font-family="monospace" font-size="8" fill="#6a7a99" text-anchor="end">High</text>

