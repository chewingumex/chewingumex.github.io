    <radialGradient id="hmuted" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cdd6f4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#cdd6f4" stop-opacity="0"/>
