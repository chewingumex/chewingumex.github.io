  <circle cx="108" cy="370" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="132" cy="390" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="155" cy="415" r="6" fill="#f59e0b" opacity="0.9"/>
