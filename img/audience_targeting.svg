  <!-- dots -->
  <circle cx="520" cy="130" r="5" fill="#00e5ff" opacity="0.8"/>
  <circle cx="545" cy="112" r="4" fill="#00e5ff" opacity="0.7"/>
  <circle cx="562" cy="148" r="6" fill="#00e5ff" opacity="0.9"/>
  <circle cx="580" cy="125" r="4" fill="#00e5ff" opacity="0.65"/>
