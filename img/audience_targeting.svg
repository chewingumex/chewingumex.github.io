  <circle cx="235" cy="152" r="5" fill="#7b61ff" opacity="0.8"/>
  <circle cx="210" cy="162" r="7" fill="#7b61ff" opacity="0.95"/> <!-- centroid -->
  <circle cx="248" cy="140" r="4" fill="#7b61ff" opacity="0.65"/>
  <circle cx="178" cy="182" r="5" fill="#7b61ff" opacity="0.7"/>
  <circle cx="262" cy="170" r="4" fill="#7b61ff" opacity="0.6"/>
  <circle cx="145" cy="162" r="3" fill="#7b61ff" opacity="0.55"/>
