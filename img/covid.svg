<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wave1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b61ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="wave3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#060a0f"/>

  <!-- Grid horizontals -->
  <line x1="68" y1="490" x2="748" y2="490" stroke="#2a3854" stroke-width="1.5"/>
  <line x1="68" y1="80"  x2="68"  y2="490" stroke="#2a3854" stroke-width="1.5"/>
  <line x1="68" y1="150" x2="748" y2="150" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="68" y1="230" x2="748" y2="230" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="68" y1="310" x2="748" y2="310" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="68" y1="390" x2="748" y2="390" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>

  <!-- Wave 1 area (cyan, Spring 2020) — smaller first wave -->
  <path d="M68,490 C80,490 95,490 115,488 C135,485 148,470 165,440
           C180,410 192,350 205,290 C218,230 225,195 232,200
           C238,205 245,245 258,310 C270,375 282,430 295,460
           C308,490 320,490 340,490 Z"
        fill="url(#wave1)"/>
  <path d="M68,490 C80,490 95,490 115,488 C135,485 148,470 165,440
           C180,410 192,350 205,290 C218,230 225,195 232,200
           C238,205 245,245 258,310 C270,375 282,430 295,460
           C308,490 320,490 340,490"
        fill="none" stroke="#00e5ff" stroke-width="1.5"/>

  <!-- Wave 2 area (purple, Autumn 2020 — biggest wave) -->
  <path d="M295,490 C315,490 330,490 348,485 C370,478 390,455 415,400
           C440,345 455,265 470,200 C480,155 488,112 496,112
           C504,112 512,155 522,200 C537,265 552,345 572,400
           C592,455 610,478 630,485 C645,490 660,490 680,490 Z"
        fill="url(#wave2)"/>
  <path d="M295,490 C315,490 330,490 348,485 C370,478 390,455 415,400
           C440,345 455,265 470,200 C480,155 488,112 496,112
           C504,112 512,155 522,200 C537,265 552,345 572,400
           C592,455 610,478 630,485 C645,490 660,490 680,490"
        fill="none" stroke="#7b61ff" stroke-width="1.5"/>

  <!-- Wave 3 area (amber, 2021 — medium) -->
  <path d="M628,490 C640,490 650,490 660,487 C672,482 682,465 695,435
           C708,405 718,360 726,318 C732,285 736,262 740,265
           C744,268 746,292 748,320 L748,490 Z"
        fill="url(#wave3)"/>
  <path d="M628,490 C640,490 650,490 660,487 C672,482 682,465 695,435
           C708,405 718,360 726,318 C732,285 736,262 740,265
           C744,268 746,292 748,320"
        fill="none" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Wave peak labels -->
  <line x1="232" y1="190" x2="232" y2="150" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="2,3"/>
  <text x="212" y="144" fill="#00e5ff" font-size="9" font-family="monospace" opacity="0.7">WAVE 1</text>
  <text x="208" y="156" fill="#00e5ff" font-size="9" font-family="monospace" opacity="0.7">MAR 2020</text>

  <line x1="496" y1="102" x2="496" y2="84" stroke="#7b61ff" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="2,3"/>
  <text x="468" y="78" fill="#7b61ff" font-size="9" font-family="monospace" opacity="0.7">WAVE 2</text>
  <text x="460" y="90" fill="#7b61ff" font-size="9" font-family="monospace" opacity="0.7">NOV 2020</text>

  <line x1="740" y1="255" x2="740" y2="198" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="2,3"/>
  <text x="688" y="192" fill="#f59e0b" font-size="9" font-family="monospace" opacity="0.7">WAVE 3</text>
  <text x="688" y="204" fill="#f59e0b" font-size="9" font-family="monospace" opacity="0.7">JAN 2021</text>

  <!-- Month labels -->
  <text x="68"  y="510" fill="#2a3854" font-size="9" font-family="monospace">JAN</text>
  <text x="178" y="510" fill="#2a3854" font-size="9" font-family="monospace">APR</text>
  <text x="290" y="510" fill="#2a3854" font-size="9" font-family="monospace">JUL</text>
  <text x="398" y="510" fill="#2a3854" font-size="9" font-family="monospace">OCT</text>
  <text x="508" y="510" fill="#2a3854" font-size="9" font-family="monospace">JAN</text>
  <text x="618" y="510" fill="#2a3854" font-size="9" font-family="monospace">APR</text>
  <text x="726" y="510" fill="#2a3854" font-size="9" font-family="monospace">JUL</text>

  <!-- Y labels -->
  <text x="30" y="155" fill="#2a3854" font-size="9" font-family="monospace" text-anchor="end">HIGH</text>
  <text x="30" y="310" fill="#2a3854" font-size="9" font-family="monospace" text-anchor="end">MED</text>
  <text x="30" y="494" fill="#2a3854" font-size="9" font-family="monospace" text-anchor="end">0</text>

  <!-- Data panel -->
  <rect x="68" y="88" width="138" height="50" rx="3" fill="#0b1219" stroke="#1c2840" stroke-width="1"/>
  <text x="78" y="106" fill="#4a5a78" font-size="9" font-family="monospace">SOURCE: NHS / ONS</text>
  <text x="78" y="122" fill="#4a5a78" font-size="9" font-family="monospace">UK COMMUNITY DATA</text>

  <!-- Title -->
  <text x="68" y="46" fill="#3a4a68" font-size="10" font-family="monospace" letter-spacing="3">COVID-19 · EPIDEMIOLOGICAL ANALYSIS</text>
</svg>
