<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bar-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b61ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bar-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#060a0f"/>

  <!-- Axes -->
  <line x1="70" y1="80"  x2="70"  y2="480" stroke="#2a3854" stroke-width="1.5"/>
  <line x1="70" y1="480" x2="748" y2="480" stroke="#2a3854" stroke-width="1.5"/>

  <!-- Grid horizontals -->
  <line x1="70" y1="130" x2="748" y2="130" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="70" y1="205" x2="748" y2="205" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="70" y1="280" x2="748" y2="280" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="70" y1="355" x2="748" y2="355" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="70" y1="430" x2="748" y2="430" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>

  <!-- Metric 1: Day-1 Retention -->
  <!-- Bar A (control, purple) -->
  <rect x="104" y="218" width="72" height="262" fill="url(#bar-a)" rx="2"/>
  <rect x="104" y="218" width="72" height="2" fill="#7b61ff" rx="1"/>
  <!-- Bar B (treatment, cyan) -->
  <rect x="184" y="178" width="72" height="302" fill="url(#bar-b)" rx="2"/>
  <rect x="184" y="178" width="72" height="2" fill="#00e5ff" rx="1"/>
  <!-- Error bars -->
  <line x1="140" y1="208" x2="140" y2="228" stroke="#7b61ff" stroke-width="2"/>
  <line x1="130" y1="208" x2="150" y2="208" stroke="#7b61ff" stroke-width="1.5"/>
  <line x1="130" y1="228" x2="150" y2="228" stroke="#7b61ff" stroke-width="1.5"/>
  <line x1="220" y1="168" x2="220" y2="188" stroke="#00e5ff" stroke-width="2"/>
  <line x1="210" y1="168" x2="230" y2="168" stroke="#00e5ff" stroke-width="1.5"/>
  <line x1="210" y1="188" x2="230" y2="188" stroke="#00e5ff" stroke-width="1.5"/>
  <!-- Significance marker -->
  <line x1="140" y1="198" x2="220" y2="198" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="145" y="192" fill="#f59e0b" font-size="10" font-family="monospace" opacity="0.9">p &lt; 0.001</text>

  <!-- Metric 2: Day-7 Retention -->
  <rect x="324" y="268" width="72" height="212" fill="url(#bar-a)" rx="2"/>
  <rect x="324" y="268" width="72" height="2" fill="#7b61ff" rx="1"/>
  <rect x="404" y="220" width="72" height="260" fill="url(#bar-b)" rx="2"/>
  <rect x="404" y="220" width="72" height="2" fill="#00e5ff" rx="1"/>
  <line x1="360" y1="258" x2="360" y2="278" stroke="#7b61ff" stroke-width="2"/>
  <line x1="350" y1="258" x2="370" y2="258" stroke="#7b61ff" stroke-width="1.5"/>
  <line x1="350" y1="278" x2="370" y2="278" stroke="#7b61ff" stroke-width="1.5"/>
  <line x1="440" y1="210" x2="440" y2="230" stroke="#00e5ff" stroke-width="2"/>
  <line x1="430" y1="210" x2="450" y2="210" stroke="#00e5ff" stroke-width="1.5"/>
  <line x1="430" y1="230" x2="450" y2="230" stroke="#00e5ff" stroke-width="1.5"/>
  <line x1="360" y1="248" x2="440" y2="248" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="365" y="242" fill="#f59e0b" font-size="10" font-family="monospace" opacity="0.9">p = 0.002</text>

  <!-- Metric 3: Session Length -->
  <rect x="546" y="188" width="72" height="292" fill="url(#bar-a)" rx="2"/>
  <rect x="546" y="188" width="72" height="2" fill="#7b61ff" rx="1"/>
  <rect x="626" y="152" width="72" height="328" fill="url(#bar-b)" rx="2"/>
  <rect x="626" y="152" width="72" height="2" fill="#00e5ff" rx="1"/>
  <line x1="582" y1="178" x2="582" y2="198" stroke="#7b61ff" stroke-width="2"/>
  <line x1="572" y1="178" x2="592" y2="178" stroke="#7b61ff" stroke-width="1.5"/>
  <line x1="572" y1="198" x2="592" y2="198" stroke="#7b61ff" stroke-width="1.5"/>
  <line x1="662" y1="142" x2="662" y2="162" stroke="#00e5ff" stroke-width="2"/>
  <line x1="652" y1="142" x2="672" y2="142" stroke="#00e5ff" stroke-width="1.5"/>
  <line x1="652" y1="162" x2="672" y2="162" stroke="#00e5ff" stroke-width="1.5"/>
  <line x1="582" y1="168" x2="662" y2="168" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.8"/>
  <text x="587" y="162" fill="#f59e0b" font-size="10" font-family="monospace" opacity="0.9">p = 0.008</text>

  <!-- X-axis labels -->
  <text x="185" y="500" fill="#3a4a68" font-size="10" font-family="monospace" text-anchor="middle">DAY-1 RETENTION</text>
  <text x="405" y="500" fill="#3a4a68" font-size="10" font-family="monospace" text-anchor="middle">DAY-7 RETENTION</text>
  <text x="625" y="500" fill="#3a4a68" font-size="10" font-family="monospace" text-anchor="middle">SESSION LENGTH</text>

  <!-- Y-axis labels -->
  <text x="56" y="133" fill="#2a3854" font-size="9" font-family="monospace" text-anchor="end">80%</text>
  <text x="56" y="208" fill="#2a3854" font-size="9" font-family="monospace" text-anchor="end">60%</text>
  <text x="56" y="283" fill="#2a3854" font-size="9" font-family="monospace" text-anchor="end">40%</text>
  <text x="56" y="358" fill="#2a3854" font-size="9" font-family="monospace" text-anchor="end">20%</text>

  <!-- Legend -->
  <rect x="80" y="528" width="14" height="10" fill="#7b61ff" rx="1" opacity="0.8"/>
  <text x="100" y="538" fill="#4a5a78" font-size="10" font-family="monospace">CONTROL (A)</text>
  <rect x="222" y="528" width="14" height="10" fill="#00e5ff" rx="1" opacity="0.8"/>
  <text x="242" y="538" fill="#4a5a78" font-size="10" font-family="monospace">TREATMENT (B)</text>

  <!-- Title -->
  <text x="70" y="46" fill="#3a4a68" font-size="10" font-family="monospace" letter-spacing="3">GAMING A/B TEST · RETENTION METRICS</text>
</svg>
