<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hist-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="fcst-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b61ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="conf-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b61ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7b61ff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#060a0f"/>

  <!-- Grid -->
  <line x1="70" y1="80"  x2="70"  y2="490" stroke="#2a3854" stroke-width="1.5"/>
  <line x1="70" y1="490" x2="748" y2="490" stroke="#2a3854" stroke-width="1.5"/>
  <line x1="70" y1="130" x2="748" y2="130" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="70" y1="200" x2="748" y2="200" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="70" y1="270" x2="748" y2="270" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="70" y1="340" x2="748" y2="340" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>
  <line x1="70" y1="410" x2="748" y2="410" stroke="#1c2840" stroke-width="0.5" stroke-dasharray="3,5"/>

  <!-- Forecast start divider -->
  <line x1="510" y1="90" x2="510" y2="490" stroke="#7b61ff" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,4"/>
  <text x="515" y="106" fill="#7b61ff" font-size="9" font-family="monospace" opacity="0.6">FORECAST</text>

  <!-- Historical area -->
  <path d="M70,420 C110,400 140,370 180,355 C220,340 240,380 280,360
           C320,340 345,310 380,290 C415,270 435,300 470,275 C490,260 500,248 510,240
           L510,490 L70,490 Z"
        fill="url(#hist-fill)"/>

  <!-- Historical line -->
  <path d="M70,420 C110,400 140,370 180,355 C220,340 240,380 280,360
           C320,340 345,310 380,290 C415,270 435,300 470,275 C490,260 500,248 510,240"
        fill="none" stroke="#00e5ff" stroke-width="2.5"/>

  <!-- Confidence band (forecast) -->
  <path d="M510,240 C540,225 570,215 610,205 C650,195 690,185 748,175
           L748,230 C710,240 668,252 628,264 C588,276 555,286 510,295 Z"
        fill="url(#conf-fill)"/>
  <!-- Confidence band lower -->
  <path d="M510,240 C540,255 568,268 608,282 C648,296 690,310 748,325
           L748,280 C710,265 668,253 630,240 C590,228 556,218 510,240 Z"
        fill="url(#conf-fill)"/>

  <!-- Forecast line (dashed, purple) -->
  <path d="M510,240 C540,228 570,215 610,205 C650,195 692,187 748,177"
        fill="none" stroke="#7b61ff" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Forecast line upper bound -->
  <path d="M510,240 C538,225 568,212 608,200 C648,188 692,178 748,165"
        fill="none" stroke="#7b61ff" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,4"/>

  <!-- Forecast line lower bound -->
  <path d="M510,240 C538,254 566,268 606,282 C648,296 692,309 748,322"
        fill="none" stroke="#7b61ff" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="3,4"/>

  <!-- Key dots on historical -->
  <circle cx="70"  cy="420" r="3.5" fill="#00e5ff"/>
  <circle cx="180" cy="355" r="3.5" fill="#00e5ff"/>
  <circle cx="280" cy="360" r="3.5" fill="#00e5ff"/>
  <circle cx="380" cy="290" r="3.5" fill="#00e5ff"/>
  <circle cx="470" cy="275" r="3.5" fill="#00e5ff"/>
  <circle cx="510" cy="240" r="4"   fill="#00e5ff" stroke="#060a0f" stroke-width="1.5"/>
  <!-- Forecast end dot -->
  <circle cx="748" cy="177" r="4"   fill="#7b61ff" stroke="#060a0f" stroke-width="1.5"/>

  <!-- Time labels -->
  <text x="70"  y="510" fill="#2a3854" font-size="9" font-family="monospace">Q1</text>
  <text x="180" y="510" fill="#2a3854" font-size="9" font-family="monospace">Q2</text>
  <text x="288" y="510" fill="#2a3854" font-size="9" font-family="monospace">Q3</text>
  <text x="396" y="510" fill="#2a3854" font-size="9" font-family="monospace">Q4</text>
  <text x="510" y="510" fill="#7b61ff" font-size="9" font-family="monospace" opacity="0.7">Q1+</text>
  <text x="625" y="510" fill="#7b61ff" font-size="9" font-family="monospace" opacity="0.7">Q2+</text>

  <!-- MAPE label -->
  <rect x="78" y="88" width="150" height="48" rx="3" fill="#0b1219" stroke="#1c2840" stroke-width="1"/>
  <text x="88" y="104" fill="#4a5a78" font-size="9" font-family="monospace">MODEL: ARIMA(2,1,1)</text>
  <text x="88" y="118" fill="#4a5a78" font-size="9" font-family="monospace">MAPE:  4.2%</text>
  <text x="88" y="132" fill="#4a5a78" font-size="9" font-family="monospace">RMSE:  1,240</text>

  <!-- Title -->
  <text x="70" y="46" fill="#3a4a68" font-size="10" font-family="monospace" letter-spacing="3">TRANSACTIONS · TIME SERIES FORECAST</text>
</svg>
