<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fill-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fill-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fill-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#060a0f"/>

  <!-- Grid horizontals -->
  <line x1="60" y1="120" x2="748" y2="120" stroke="#1c2840" stroke-width="1"/>
  <line x1="60" y1="200" x2="748" y2="200" stroke="#1c2840" stroke-width="1"/>
  <line x1="60" y1="280" x2="748" y2="280" stroke="#1c2840" stroke-width="1"/>
  <line x1="60" y1="360" x2="748" y2="360" stroke="#1c2840" stroke-width="1"/>
  <line x1="60" y1="440" x2="748" y2="440" stroke="#1c2840" stroke-width="1"/>
  <!-- Y axis -->
  <line x1="60" y1="80" x2="60" y2="460" stroke="#2a3854" stroke-width="1.5"/>

  <!-- Year tick marks -->
  <line x1="228" y1="455" x2="228" y2="465" stroke="#2a3854" stroke-width="1"/>
  <line x1="396" y1="455" x2="396" y2="465" stroke="#2a3854" stroke-width="1"/>
  <line x1="564" y1="455" x2="564" y2="465" stroke="#2a3854" stroke-width="1"/>

  <!-- Category lines (faint) -->
  <path d="M60,340 C120,320 160,360 228,370 C300,380 340,340 396,310 C450,285 490,300 564,280 C620,265 680,250 748,245"
        fill="none" stroke="#f43f5e" stroke-width="1.2" stroke-opacity="0.55"/>
  <path d="M60,310 C100,290 150,350 228,355 C290,360 340,290 396,270 C450,255 510,330 564,320 C620,310 690,295 748,285"
