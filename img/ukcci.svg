  <!-- Event marker — mini-budget spike -->
  <line x1="290" y1="100" x2="290" y2="380" stroke="#f43f5e" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.6"/>
  <circle cx="290" cy="340" r="4" fill="none" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="295" y="138" fill="#f43f5e" font-size="8" font-family="monospace" transform="rotate(-90,295,138)">MINI-BUDGET</text>

  <!-- Event marker — BoE peak -->
  <line x1="478" y1="100" x2="478" y2="300" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.6"/>
  <circle cx="478" cy="220" r="4" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="483" y="138" fill="#fbbf24" font-size="8" font-family="monospace" transform="rotate(-90,483,138)">BOE PEAK</text>

  <!-- Key dots on total line -->
  <circle cx="60"  cy="320" r="3.5" fill="#00e5ff"/>
  <circle cx="228" cy="255" r="3.5" fill="#00e5ff"/>
  <circle cx="396" cy="340" r="3.5" fill="#00e5ff"/>
  <circle cx="564" cy="205" r="4.5" fill="#00e5ff"/>
  <circle cx="748" cy="228" r="3.5" fill="#00e5ff"/>

  <!-- Axis labels -->
  <text x="58"  y="478" fill="#2a3854" font-size="9" font-family="monospace">2022</text>
  <text x="220" y="478" fill="#2a3854" font-size="9" font-family="monospace">2023</text>
  <text x="388" y="478" fill="#2a3854" font-size="9" font-family="monospace">2024</text>
  <text x="556" y="478" fill="#2a3854" font-size="9" font-family="monospace">2025</text>

  <!-- Legend -->
  <line x1="60" y1="533" x2="84" y2="533" stroke="#00e5ff" stroke-width="2.5"/>
  <text x="89" y="537" fill="#4a5a78" font-size="10" font-family="monospace">UK-CCI TOTAL</text>
  <line x1="200" y1="533" x2="218" y2="533" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="223" y="537" fill="#4a5a78" font-size="10" font-family="monospace">LARGE EXPENSES</text>
  <line x1="355" y1="533" x2="373" y2="533" stroke="#818cf8" stroke-width="1.5"/>
  <text x="378" y="537" fill="#4a5a78" font-size="10" font-family="monospace">SAVINGS</text>

  <!-- Title label -->
  <text x="60" y="58" fill="#3a4a68" font-size="10" font-family="monospace" letter-spacing="3">UK CONSUMER CONFIDENCE · AUTOENCODER + SHAP</text>
