  <!-- Mini bar chart (SHAP style) at bottom strip -->
  <rect x="65"  y="410" width="18" height="32" fill="#00e5ff" fill-opacity="0.35" rx="1"/>
  <rect x="90"  y="418" width="18" height="24" fill="#f43f5e" fill-opacity="0.35" rx="1"/>
  <rect x="115" y="405" width="18" height="37" fill="#818cf8" fill-opacity="0.35" rx="1"/>
  <rect x="140" y="420" width="18" height="22" fill="#4ade80" fill-opacity="0.35" rx="1"/>
  <rect x="165" y="415" width="18" height="27" fill="#fbbf24" fill-opacity="0.35" rx="1"/>
  <rect x="190" y="408" width="18" height="34" fill="#00e5ff" fill-opacity="0.2"  rx="1"/>
  <rect x="215" y="422" width="18" height="20" fill="#f43f5e" fill-opacity="0.2"  rx="1"/>

  <!-- UK-CCI total line (cyan, primary) -->
  <path d="M60,320 C110,295 150,270 228,255 C300,240 345,330 396,340
           C445,350 480,220 564,205 C630,195 690,235 748,228"
